name: AdvEoH
max_generations: 16
max_sample_nums: 200
pop_size_heu: 10
pop_size_inst: 3
samples_per_gen_heu: 10
samples_per_gen_inst: 4
n_inst_sample: 1
n_fixed_inst_sample: 32
n_seed: 8
n_opponent_desc: 3
use_plateau_trigger: false
inst_update_interval: 4
plateau_window: 3
min_heu_generations_per_phase: 3
inst_update_inner_rounds: 1
plateau_epsilon: 0.0
mwu_eta_heu: 2.5
mwu_eta_inst: 1.6
num_samplers: 4
num_evaluators: 4

# Failure-Mode Accumulation (FMA) settings
use_fma: true
fma_lambda: 0.3
fma_memory_size: 100
fma_min_delta: 0.05
fma_top_k_failures: 3
fma_heuristic_coverage_weight: 0.2
fma_archive_path: null
